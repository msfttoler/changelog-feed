<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --text-2: #86868b;
      --border: #d2d2d7;
      --github: #f78166;
      --vscode: #007acc;
      --vs: #68217a;
      --copilot: #8b5cf6;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-h: 0 4px 14px rgba(0,0,0,0.08);
      --max-w: 740px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --surface: #1c1c1e;
        --text: #f5f5f7;
        --text-2: #8e8e93;
        --border: #38383a;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-h: 0 4px 14px rgba(0,0,0,0.4);
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    header {
      text-align: center;
      padding: 3rem 1.5rem 0.75rem;
    }
    header h1 {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    header p {
      color: var(--text-2);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    /* ---- Controls ---- */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 1rem 1.5rem 0.75rem;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .controls::after {
      content: '';
      display: block;
      height: 1px;
      background: var(--border);
      margin-top: 0.75rem;
      opacity: 0.5;
    }

    /* Search */
    .search {
      position: relative;
      margin-bottom: 0.625rem;
    }
    .search svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-2);
      pointer-events: none;
    }
    .search input {
      width: 100%;
      padding: 0.6rem 0.75rem 0.6rem 2.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    .search input:focus { border-color: var(--vscode); }
    .search input::placeholder { color: var(--text-2); }
    .search .hint {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.625rem;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.0625rem 0.375rem;
      pointer-events: none;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.375rem;
      flex-wrap: wrap;
    }
    .f-btn {
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--text-2);
      font-size: 0.8rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .f-btn:hover { border-color: var(--text-2); color: var(--text); }
    .f-btn.on { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* source-colored dot on filter buttons */
    .f-btn .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* ---- Entry list ---- */
    .entries {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0.75rem 1.5rem 3rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.5rem;
      box-shadow: var(--shadow);
      border-left: 3px solid var(--border);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      box-shadow: var(--shadow-h);
      transform: translateY(-1px);
    }
    .card[data-src="github"]       { border-left-color: var(--github); }
    .card[data-src="vscode"]       { border-left-color: var(--vscode); }
    .card[data-src="visualstudio"] { border-left-color: var(--vs); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.375rem;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.1rem 0.45rem;
      border-radius: 100px;
      color: #fff;
    }
    .badge.github       { background: var(--github); }
    .badge.vscode       { background: var(--vscode); }
    .badge.visualstudio { background: var(--vs); }
    .badge.copilot      { background: var(--copilot); }

    .card-time {
      font-size: 0.7rem;
      color: var(--text-2);
      margin-left: auto;
      white-space: nowrap;
    }

    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.25rem;
    }
    .card-title a {
      color: var(--text);
      text-decoration: none;
    }
    .card-title a:hover { text-decoration: underline; }

    .card-desc {
      font-size: 0.8rem;
      color: var(--text-2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
    }
    .tag {
      font-size: 0.65rem;
      padding: 0.05rem 0.4rem;
      border-radius: 4px;
      background: var(--bg);
      color: var(--text-2);
    }

    /* ---- States ---- */
    .loading, .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-2);
      font-size: 0.9rem;
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--vscode);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Status bar ---- */
    .status {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-2);
      padding: 0.75rem;
    }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      header { padding: 2rem 1rem 0.5rem; }
      .controls { padding: 0.75rem 1rem 0.5rem; }
      .entries { padding: 0.5rem 1rem 2rem; }
      .card { padding: 0.875rem 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Changelog Feed</h1>
    <p>GitHub platform &amp; IDE updates, all in one place</p>
  </header>

  <div class="controls">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="5"/>
        <line x1="10.2" y1="10.2" x2="14.5" y2="14.5"/>
      </svg>
      <input type="search" id="search" placeholder="Search changelogs…" autocomplete="off">
      <span class="hint">/</span>
    </div>
    <div class="filters" id="filters">
      <button class="f-btn on" data-f="all">All</button>
      <button class="f-btn" data-f="github"><span class="dot" style="background:var(--github)"></span>GitHub</button>
      <button class="f-btn" data-f="copilot"><span class="dot" style="background:var(--copilot)"></span>Copilot</button>
      <button class="f-btn" data-f="vscode"><span class="dot" style="background:var(--vscode)"></span>VS Code</button>
      <button class="f-btn" data-f="visualstudio"><span class="dot" style="background:var(--vs)"></span>Visual Studio</button>
    </div>
  </div>

  <div class="entries" id="entries">
    <div class="loading"><div class="spinner"></div><br>Loading changelogs…</div>
  </div>

  <div class="status" id="status"></div>

  <script>
    /* ---- Helpers ---- */
    const SRC = { github: 'GitHub', vscode: 'VS Code', visualstudio: 'Visual Studio' };

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function safeHref(url) {
      try { const u = new URL(url); return ['http:','https:'].includes(u.protocol) ? u.href : '#'; }
      catch { return '#'; }
    }

    function ago(iso) {
      const s = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (s < 60) return 'just now';
      const units = [[31536000,'y'],[2592000,'mo'],[86400,'d'],[3600,'h'],[60,'m']];
      for (const [n,l] of units) { const c = Math.floor(s/n); if (c >= 1) return c + l + ' ago'; }
      return 'just now';
    }

    /* ---- State ---- */
    let all = [], filter = 'all', query = '';

    /* ---- Render ---- */
    function render() {
      const q = query.toLowerCase();
      const list = all.filter(e => {
        if (filter === 'copilot' && !e.is_copilot) return false;
        if (filter !== 'all' && filter !== 'copilot' && e.source !== filter) return false;
        if (q && !e.title.toLowerCase().includes(q) && !e.description.toLowerCase().includes(q)
            && !e.tags.some(t => t.includes(q))) return false;
        return true;
      });

      const box = document.getElementById('entries');
      if (!list.length) { box.innerHTML = '<div class="empty">No entries match your filter</div>'; updateStatus(list.length); return; }

      box.innerHTML = list.map(e => `
        <div class="card" data-src="${esc(e.source)}">
          <div class="card-top">
            <span class="badge ${esc(e.source)}">${esc(SRC[e.source] || e.source)}</span>
            ${e.is_copilot ? '<span class="badge copilot">Copilot</span>' : ''}
            <span class="card-time">${ago(e.published)}</span>
          </div>
          <div class="card-title"><a href="${safeHref(e.link)}" target="_blank" rel="noopener">${esc(e.title)}</a></div>
          ${e.description ? `<div class="card-desc">${esc(e.description)}</div>` : ''}
          ${e.tags.length ? `<div class="card-tags">${e.tags.slice(0,6).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');
      updateStatus(list.length);
    }

    function updateStatus(shown) {
      const st = document.getElementById('status');
      const total = all.length;
      const ts = window._fetchedAt ? new Date(window._fetchedAt).toLocaleTimeString() : '';
      st.textContent = (shown < total ? `${shown} of ${total}` : `${total}`) + ` entries` + (ts ? ` · Updated ${ts}` : '');
    }

    /* ---- Filters ---- */
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.f-btn');
      if (!btn) return;
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      filter = btn.dataset.f;
      render();
    });

    /* ---- Search ---- */
    const searchEl = document.getElementById('search');
    searchEl.addEventListener('input', () => { query = searchEl.value; render(); });

    /* Keyboard shortcut: / to focus, Esc to clear */
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== searchEl) { e.preventDefault(); searchEl.focus(); }
      if (e.key === 'Escape' && document.activeElement === searchEl) { searchEl.value = ''; query = ''; render(); searchEl.blur(); }
    });

    /* ---- Fetch ---- */
    async function load() {
      try {
        const res = await fetch('/api/entries');
        const data = await res.json();
        all = data.entries;
        window._fetchedAt = data.fetched_at;
        render();
      } catch {
        document.getElementById('entries').innerHTML = '<div class="empty">Failed to load — retrying…</div>';
        setTimeout(load, 5000);
      }
    }

    load();
    setInterval(load, 300000);
  </script>
</body>
</html>
